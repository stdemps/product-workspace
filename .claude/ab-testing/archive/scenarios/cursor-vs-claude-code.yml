name: "Cursor vs Claude Code Development Velocity"
description: "Compare development speed and quality using Cursor IDE vs Claude Code CLI"

type: manual_observation

# The same feature to build in both environments
task: |
  Build a user authentication flow with:
  - Sign up form (email, password, confirm password)
  - Login form (email, password, remember me)
  - Password validation (min 8 chars, uppercase, number, special char)
  - Form validation with real-time feedback
  - Loading states during submission
  - Error handling and display
  - Success redirects
  - Full accessibility (WCAG 2.1 AA)
  - Mobile-responsive (mobile-first)
  - Dark mode support
  - TypeScript strict mode
  - Unit tests for validation logic

# How to run the test
instructions: |
  ## Setup

  1. Create two identical clones of the workspace:
     ```bash
     git clone workspace-template cursor-test
     git clone workspace-template claude-code-test
     ```

  2. Start timing when you begin, stop when fully complete

  ## Cursor Test (Test A)

  1. Open `cursor-test/` in Cursor IDE
  2. Use Cursor's AI features:
     - @engineer for technical questions
     - @designer for UX questions
     - Cursor's autocomplete
     - Cursor's chat for implementation
  3. Track your workflow in `test-log-cursor.md`

  ## Claude Code Test (Test B)

  1. Open `claude-code-test/` in your regular editor (VS Code, etc.)
  2. Use Claude Code CLI:
     - /engineer "question" for technical guidance
     - /designer "question" for UX guidance
     - Chat mode for implementation help
     - Skills for file reviews
  3. Track your workflow in `test-log-claude-code.md`

  ## What to Track

  For each test, record:
  - Start time
  - End time
  - Number of questions asked to AI
  - Number of iterations/revisions needed
  - Blockers encountered
  - Quality gate violations
  - Your subjective experience (1-10)

# Evaluation metrics
evaluation:
  metrics:
    - name: time_to_completion
      description: "Total time from start to finish (minutes)"
      type: manual
      weight: 0.3
      inverse: true  # Lower is better

    - name: code_quality_score
      description: "Automated quality checks"
      script: |
        score=10

        # TypeScript errors
        ts_errors=$(npx tsc --noEmit 2>&1 | grep -c "error TS" || echo 0)
        score=$((score - ts_errors))

        # ESLint errors
        lint_errors=$(npx eslint app/ components/ --format json 2>/dev/null | jq '[.[].errorCount] | add // 0')
        score=$((score - lint_errors))

        # Accessibility check (if files exist)
        if [ -f "components/signup-form.tsx" ]; then
          if ! grep -q "aria-" components/signup-form.tsx; then
            score=$((score - 2))
          fi
        fi

        # Ensure non-negative
        if [ "$score" -lt 0 ]; then score=0; fi

        echo "$score"
      weight: 0.3

    - name: test_coverage
      description: "Percentage of code with tests"
      script: |
        # Count test files
        test_files=$(find . -name "*.test.tsx" -o -name "*.test.ts" | wc -l)

        # Simple score: 10 points if tests exist, 0 if not
        if [ "$test_files" -gt 0 ]; then
          echo "10"
        else
          echo "0"
        fi
      weight: 0.2

    - name: iterations_needed
      description: "Number of revisions/attempts needed"
      type: manual
      weight: 0.1
      inverse: true  # Lower is better

    - name: developer_experience
      description: "Subjective experience rating (1-10)"
      type: manual
      weight: 0.1

# What defines success
pass_criteria:
  time_to_completion: "<= 120"  # Should complete in under 2 hours
  code_quality_score: ">= 8"
  test_coverage: ">= 5"

# Decision framework
decision_criteria:
  time_difference_threshold: 20  # % difference to be meaningful
  quality_minimum: 8  # Don't adopt if quality drops below this
  experience_minimum: 7  # Don't adopt if developer experience is poor
