name: "API Route Quality"
description: "Compare quality of generated API routes"

type: code_generation

prompt: |
  Create a REST API route for managing user tasks:

  Location: app/api/tasks/route.ts

  Requirements:
  - GET: Return all tasks for the authenticated user
  - POST: Create a new task
  - Validate required fields (title is required, description optional)
  - Return appropriate HTTP status codes (200, 201, 400, 401, 500)
  - Use TypeScript with proper typing
  - Include error handling
  - Add request validation
  - Include JSDoc comments
  - Follow Next.js 16 App Router conventions

evaluation:
  metrics:
    - name: typescript_score
      description: "TypeScript quality (0-10)"
      script: |
        file="app/api/tasks/route.ts"
        score=10

        # Check for type errors
        errors=$(npx tsc --noEmit 2>&1 | grep -c "error TS" || echo 0)
        score=$((score - errors))

        # Check for 'any' types (bad)
        any_count=$(grep -c ": any" "$file" || echo 0)
        score=$((score - any_count))

        # Check for proper return types
        if ! grep -q "Promise<Response>" "$file" && ! grep -q "Promise<NextResponse" "$file"; then
          score=$((score - 2))
        fi

        # Ensure score doesn't go negative
        if [ "$score" -lt 0 ]; then score=0; fi

        echo "$score"
      weight: 0.3

    - name: error_handling_score
      description: "Error handling completeness (0-10)"
      script: |
        file="app/api/tasks/route.ts"
        score=0

        # Check for try-catch
        if grep -q "try {" "$file"; then
          score=$((score + 3))
        fi

        # Check for status code handling
        if grep -q "400" "$file"; then score=$((score + 2)); fi
        if grep -q "401" "$file"; then score=$((score + 2)); fi
        if grep -q "500" "$file"; then score=$((score + 2)); fi

        # Check for error messages in response
        if grep -q "error" "$file" | grep -q "message"; then
          score=$((score + 1))
        fi

        echo "$score"
      weight: 0.3

    - name: validation_score
      description: "Request validation quality (0-10)"
      script: |
        file="app/api/tasks/route.ts"
        score=0

        # Check for title validation
        if grep -q "title" "$file" | grep -q "required\|!.*title\|throw"; then
          score=$((score + 5))
        fi

        # Check for schema validation (zod, yup, etc.)
        if grep -q "zod\|yup\|parse\|validate" "$file"; then
          score=$((score + 3))
        fi

        # Check for type validation
        if grep -q "typeof" "$file"; then
          score=$((score + 2))
        fi

        echo "$score"
      weight: 0.2

    - name: rest_conventions_score
      description: "RESTful conventions adherence (0-10)"
      script: |
        file="app/api/tasks/route.ts"
        score=0

        # Check for GET handler
        if grep -q "export async function GET" "$file"; then
          score=$((score + 2))
        fi

        # Check for POST handler
        if grep -q "export async function POST" "$file"; then
          score=$((score + 2))
        fi

        # Check for proper status codes
        if grep -q "NextResponse.json.*status.*200" "$file"; then
          score=$((score + 2))
        fi

        if grep -q "NextResponse.json.*status.*201" "$file"; then
          score=$((score + 2))
        fi

        # Check for request body parsing
        if grep -q "await.*json()" "$file"; then
          score=$((score + 2))
        fi

        echo "$score"
      weight: 0.2

expected_output:
  files:
    - app/api/tasks/route.ts

pass_criteria:
  typescript_score: ">= 7"
  error_handling_score: ">= 6"
  validation_score: ">= 5"
  rest_conventions_score: ">= 7"
