name: "Component Generation Quality"
description: "Compare quality of generated React components"

type: code_generation

# The prompt given to the agent
prompt: |
  Create a LoginForm component with the following requirements:

  - Email and password input fields with proper labels
  - "Remember me" checkbox
  - Submit button with loading state
  - Error message display area
  - Full accessibility compliance (WCAG 2.1 AA)
  - Mobile-responsive using mobile-first approach
  - Dark mode support via next-themes
  - TypeScript strict mode
  - Use shadcn/ui components where applicable
  - Include basic client-side validation
  - Export the component as default

  Create the component in components/login-form.tsx

# How to evaluate the results
evaluation:
  metrics:
    - name: typescript_errors
      description: "Count of TypeScript compilation errors"
      command: "npx tsc --noEmit --project tsconfig.json 2>&1 | grep -c 'error TS' || echo 0"
      weight: 0.3
      inverse: true  # Lower is better

    - name: accessibility_score
      description: "Accessibility compliance score (0-10)"
      script: |
        # Check for accessibility attributes
        score=10
        file="components/login-form.tsx"

        # Check for aria-labels
        if ! grep -q "aria-label" "$file" && ! grep -q "aria-labelledby" "$file"; then
          score=$((score - 2))
        fi

        # Check for proper label associations
        if ! grep -q "htmlFor" "$file"; then
          score=$((score - 2))
        fi

        # Check for error announcements
        if ! grep -q "aria-live" "$file" && ! grep -q "role=\"alert\"" "$file"; then
          score=$((score - 2))
        fi

        # Check for disabled state handling
        if ! grep -q "aria-disabled" "$file" && ! grep -q "disabled=" "$file"; then
          score=$((score - 2))
        fi

        echo "$score"
      weight: 0.3

    - name: mobile_first_score
      description: "Mobile-first implementation score (0-10)"
      script: |
        score=10
        file="components/login-form.tsx"

        # Check for desktop-first patterns (bad)
        if grep -q "md:" "$file" | head -1 | grep -v "^[[:space:]]*//"; then
          # Count responsive modifiers
          desktop_first=$(grep -o "md:\|lg:\|xl:\|2xl:" "$file" | grep -v "^[[:space:]]*//" | wc -l)
          mobile_first=$(grep -o "sm:\|md:\|lg:" "$file" | grep "sm:" | wc -l)

          if [ "$desktop_first" -gt "$mobile_first" ]; then
            score=$((score - 3))
          fi
        fi

        # Check for fixed widths (bad for mobile)
        if grep -q "w-\[.*px\]" "$file" | grep -v "^[[:space:]]*//"; then
          score=$((score - 2))
        fi

        # Check for responsive container
        if ! grep -q "w-full" "$file"; then
          score=$((score - 1))
        fi

        echo "$score"
      weight: 0.2

    - name: lines_of_code
      description: "Total lines of code (brevity check)"
      command: "wc -l < components/login-form.tsx"
      weight: 0.1
      inverse: true  # Lower is better
      threshold:
        max: 200  # Component shouldn't exceed 200 lines

    - name: code_quality
      description: "ESLint violations"
      command: "npx eslint components/login-form.tsx --format json 2>/dev/null | jq '[.[].errorCount] | add // 0'"
      weight: 0.1
      inverse: true  # Lower is better

# Expected output files
expected_output:
  files:
    - components/login-form.tsx

  optional_files:
    - components/__tests__/login-form.test.tsx

# Pass/fail criteria
pass_criteria:
  typescript_errors: 0
  accessibility_score: ">= 7"
  mobile_first_score: ">= 7"
  code_quality: 0

# Scoring
scoring:
  method: weighted_average  # Options: weighted_average, pass_fail, custom

  # Bonus points
  bonus:
    - condition: "test_file_exists"
      points: 1
      description: "Bonus for including tests"
