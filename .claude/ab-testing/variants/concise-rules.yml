name: "Concise Rules Configuration"
description: "Shorter, more focused Cursor rules to reduce context loading time"

# Cursor rules to include
cursor_rules:
  - path: .cursor/rules/ui-design-guidelines-concise.mdc
    enabled: true
    content: |
      # UI Guidelines (Concise)

      **Mobile-first:** Base styles for mobile, add breakpoints up
      **Accessibility:** Use semantic HTML, ARIA when needed, keyboard nav
      **Dark mode:** Use next-themes, test both modes
      **Components:** shadcn/ui, Tailwind, TypeScript strict

  - path: .cursor/rules/coding-standards-concise.mdc
    enabled: true
    content: |
      # Coding Standards (Concise)

      **TypeScript:** Strict mode, no 'any', proper types
      **React:** Functional components, hooks, minimize re-renders
      **Next.js:** App Router, Server Components default, Client when needed
      **Testing:** Test user behavior, not implementation
      **Security:** Validate inputs, sanitize outputs, follow OWASP

  - path: .cursor/rules/project-context.mdc
    enabled: true

# Claude Code agents (same as baseline)
claude_agents:
  - path: .claude/agents/engineer.js
    enabled: true
  - path: .claude/agents/designer.js
    enabled: true

# Claude Code skills (same as baseline)
claude_skills:
  - path: .claude/skills/engineer-review.js
    enabled: true
  - path: .claude/skills/designer-review.js
    enabled: true
  - path: .claude/skills/prd-review.js
    enabled: true

# Quality gates and hooks (same as baseline)
hooks:
  - path: .claude/hooks/quality-gate.sh
    enabled: true
    trigger: pre-commit

# Settings (same as baseline)
settings:
  auto_context: true
  mobile_first_validation: true
  strict_typescript: true
  accessibility_checks: true

# Configuration metadata
metadata:
  version: "1.1.0"
  created: "2025-01-15"
  purpose: "Test hypothesis: concise rules are faster without quality loss"
  hypothesis: "Reducing Cursor rules to essentials will improve context load time without sacrificing code quality"
  changes:
    - "Condensed ui-design-guidelines.mdc from ~200 lines to ~10 lines"
    - "Condensed coding-standards.mdc from ~150 lines to ~10 lines"
  expected_outcomes:
    - "Faster context loading (target: >30% reduction)"
    - "Similar code quality (target: <5% score decrease)"
